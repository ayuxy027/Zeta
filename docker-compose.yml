name: zeta

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zeta
      POSTGRES_PASSWORD: zeta
      POSTGRES_DB: zeta
    volumes:
      - zeta_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zeta -d zeta']
      interval: 3s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  api:
    build: ./backend
    ports:
      - '3001:3001'
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
      PORT: '3001'
      AUTH0_BASE_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  zeta_pg:
