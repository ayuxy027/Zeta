# `docker compose up --build`
#
# Stack: Postgres, Redis (Slack queue), API (Node only — PDFs use pdf-parse / PDF.js text layer).
#
# Create backend/.env from backend/.env.example. For local Postgres in Compose:
#   DB_URL=postgresql://zeta:zeta@postgres:5432/zeta?sslmode=disable
#   REDIS_URL=redis://redis:6379

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zeta
      POSTGRES_PASSWORD: zeta
      POSTGRES_DB: zeta
    volumes:
      - zeta_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zeta -d zeta']
      interval: 3s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    environment:
      PORT: '3000'
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  zeta_pg:
