name: zeta

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zeta
      POSTGRES_PASSWORD: zeta
      POSTGRES_DB: zeta
    volumes:
      - zeta_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zeta -d zeta']
      interval: 3s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - zeta_neo4j:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:7474 || exit 1']
      interval: 10s
      timeout: 10s
      retries: 10

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - zeta_chroma:/chroma/chroma
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8000/api/v2/heartbeat || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    ports:
      - '3001:3001'
    env_file:
      - ./backend/.env
    environment:
      PORT: '3001'
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: 'true'
      AUTH0_BASE_URL: http://localhost:3001
      DB_URL: postgresql://zeta:zeta@postgres:5432/zeta?sslmode=disable
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      CHROMADB_URL: http://chromadb:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_healthy

volumes:
  zeta_pg:
  zeta_neo4j:
  zeta_chroma:
